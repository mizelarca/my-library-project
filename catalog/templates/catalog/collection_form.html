{% extends 'catalog/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">{{ title }}</h1>
        <div class="card static-card" style="background-color: #e6d7c4;">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="{{ form.name.id_for_label }}" class="form-label">Название</label>
                        {{ form.name }}
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.description.id_for_label }}" class="form-label">Описание (необязательно)</label>
                        {{ form.description }}
                    </div>

                    <button type="submit" class="btn btn-success">Сохранить</button>
                    <a href="{% url 'collection_list' %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
