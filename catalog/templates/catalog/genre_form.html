{% extends 'catalog/base.html' %}
{% block title %}Добавить жанр{% endblock %}
{% block content %}
<h2>Добавить новый жанр</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url next %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
